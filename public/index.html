<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e293b">
  <title>Custom Crates & Pallets</title>
  <link rel="stylesheet" href="op.css">
</head>
<body>

  <!-- PANTALLA INICIO -->
  <div id="pantallaInicio" class="pantalla activa">
    <div class="inicio-hero">
      <img src="CCP.png" alt="Custom Crates & Pallets" class="hero-logo" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'">
      <div id="logoFallback" class="hero-logo-fallback" style="display:none">🔨</div>
      <div class="hero-divider"></div>
      <h1 class="hero-nombre">Custom Crates<br>&amp; Pallets, Inc.</h1>
      <p class="hero-sub">Control de Producción</p>
    </div>
    <div class="inicio-body">
      <p id="fechaHoy" class="fecha-hoy"></p>
      <p class="instruccion">Selecciona tu turno</p>
      <button class="btn-turno" onclick="seleccionarTurno('Matutino')">
        <span class="turno-icon">🌅</span>
        <div class="turno-texto">
          <span class="turno-nombre">Turno Matutino</span>
          <span class="turno-hora">6:00 am – 2:00 pm</span>
        </div>
      </button>
      <button class="btn-turno" onclick="seleccionarTurno('Vespertino')">
        <span class="turno-icon">🌇</span>
        <div class="turno-texto">
          <span class="turno-nombre">Turno Vespertino</span>
          <span class="turno-hora">2:00 pm – 10:00 pm</span>
        </div>
      </button>
      <div id="errorInicio" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- PANTALLA OPERADOR -->
  <div id="pantallaOp" class="pantalla">
    <header class="op-header">
      <div class="op-header-left">
        <img src="CCP.png" alt="" class="logo-header" onerror="this.style.display='none'">
        <div>
          <div class="op-turno" id="opTurnoLabel"></div>
          <div class="op-fecha" id="opFechaLabel"></div>
        </div>
      </div>
      <div class="op-total-wrap">
        <span class="op-total-num" id="opTotalNum">0</span>
        <span class="op-total-label">piezas</span>
      </div>
    </header>

    <div class="acciones">
      <button class="btn-accion btn-prod" onclick="abrirModalProd()">
        <span class="accion-icon">➕</span>
        <span>Producción</span>
      </button>
      <button class="btn-accion btn-muerto" onclick="abrirModalMuerto()">
        <span class="accion-icon">⏸</span>
        <span>Tiempo Muerto</span>
      </button>
    </div>

    <div class="resumen-section">
      <div class="resumen-tabs">
        <button class="res-tab activa" onclick="mostrarTab('tabProd', this)">Producción</button>
        <button class="res-tab" onclick="mostrarTab('tabMuerto', this)">Tiempos Muertos</button>
      </div>

      <div id="tabProd" class="res-contenido activa">
        <div id="listaProd" class="lista-registros">
          <div class="empty-state">Sin registros aún</div>
        </div>
      </div>

      <div id="tabMuerto" class="res-contenido">
        <div id="listaMinutos" class="minutos-total hidden">
          ⏱ Total tiempo muerto: <strong id="totalMinutos">0</strong> min
        </div>
        <div id="listaMuerto" class="lista-registros">
          <div class="empty-state">Sin tiempos muertos</div>
        </div>
      </div>
    </div>

    <div class="cerrar-wrap">
      <button class="btn-reporte" onclick="compartirReporte()">📤 Enviar Reporte del Turno</button>
      <button class="btn-cerrar" onclick="cerrarTurno()">Cerrar Turno</button>
    </div>
  </div>

  <!-- MODAL: REGISTRAR PRODUCCIÓN -->
  <div id="modalProd" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Registrar Producción</h2>
        <button class="btn-close" onclick="cerrarModal('modalProd')">✕</button>
      </div>

      <label class="field-label">Hora</label>
      <select id="pHora" class="field-select"></select>

      <label class="field-label">Modelo de Tarima</label>
      <div id="modeloGrid" class="modelo-grid"></div>
      <button class="btn-link" onclick="mostrarNuevoModelo()">+ Agregar modelo nuevo</button>
      <div id="nuevoModeloWrap" class="hidden" style="margin:.5rem 0">
        <div style="display:flex;gap:.5rem">
          <input type="text" id="nuevoModeloInput" class="field-input" placeholder="Ej: 48X40XX" style="text-transform:uppercase;flex:1">
          <button class="btn-sm-add" onclick="agregarModelo()">OK</button>
        </div>
      </div>

      <label class="field-label">Cantidad</label>
      <input type="number" id="pCantidad" class="field-input field-big" inputmode="numeric" placeholder="0" min="1">

      <button class="btn-guardar" onclick="guardarProd()">Guardar</button>
    </div>
  </div>

  <!-- MODAL: TIEMPO MUERTO -->
  <div id="modalMuerto" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>⏸ Tiempo Muerto</h2>
        <button class="btn-close" onclick="cerrarModal('modalMuerto')">✕</button>
      </div>

      <label class="field-label">Motivo</label>
      <div class="motivos-grid">
        <button class="btn-motivo" onclick="selMotivo(this)">Mantenimiento</button>
        <button class="btn-motivo" onclick="selMotivo(this)">Falta de material</button>
        <button class="btn-motivo" onclick="selMotivo(this)">Falla mecánica</button>
        <button class="btn-motivo" onclick="selMotivo(this)">Cambio de modelo</button>
        <button class="btn-motivo" onclick="selMotivo(this)">Descanso</button>
        <button class="btn-motivo" onclick="selMotivo(this)">Otro</button>
      </div>
      <div id="otroWrap" class="hidden">
        <label class="field-label" style="margin-top:.25rem">¿Cuál fue el motivo?</label>
        <input type="text" id="mMotivoCustom" class="field-input" placeholder="Describe el motivo...">
      </div>

      <label class="field-label">Total de minutos parado</label>
      <input type="number" id="mMinutos" class="field-input field-big" inputmode="numeric" placeholder="0" min="1">

      <button class="btn-guardar btn-guardar-muerto" onclick="guardarMuerto()">Guardar</button>
    </div>
  </div>

  <!-- MODAL: REPORTE -->
  <div id="modalReporte" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>📋 Reporte del Turno</h2>
        <button class="btn-close" onclick="cerrarModal('modalReporte')">✕</button>
      </div>
      <pre id="reporteTexto" class="reporte-pre"></pre>
      <button class="btn-guardar" onclick="enviarReporte()">📤 Compartir (WhatsApp / Email)</button>
    </div>
  </div>

  <script src="op.js"></script>
</body>
</html>
