<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e293b">
  <title>Manager — Clavadora</title>
  <link rel="stylesheet" href="mgr.css">
</head>
<body>
  <header class="mgr-header">
    <div class="mgr-logo">🔨 Clavadora</div>
    <span class="mgr-badge">Manager</span>
  </header>

  <div class="mgr-tabs">
    <button class="mgr-tab activa" onclick="showTab('tabDia', this)">Por Día</button>
    <button class="mgr-tab" onclick="showTab('tabRango', this)">Rango</button>
    <button class="mgr-tab" onclick="showTab('tabModelos', this)">Modelos</button>
  </div>

  <!-- TAB: POR DÍA -->
  <div id="tabDia" class="mgr-tab-content activa">
    <div class="filtro-row">
      <input type="date" id="dFecha" class="field-date">
      <button class="btn-buscar" onclick="cargarDia()">Ver</button>
    </div>

    <div id="dResultado"></div>
  </div>

  <!-- TAB: RANGO -->
  <div id="tabRango" class="mgr-tab-content">
    <div class="filtro-row">
      <input type="date" id="rDesde" class="field-date">
      <span style="color:#64748b;padding:0 .25rem">–</span>
      <input type="date" id="rHasta" class="field-date">
      <button class="btn-buscar" onclick="cargarRango()">Ver</button>
    </div>
    <div id="rResultado"></div>
  </div>

  <!-- TAB: MODELOS -->
  <div id="tabModelos" class="mgr-tab-content">
    <div class="card" style="margin:1rem">
      <div class="filtro-row" style="margin-bottom:0">
        <input type="text" id="nuevoModelo" class="field-date" placeholder="Ej: 48X40XX" style="text-transform:uppercase;flex:1">
        <button class="btn-buscar" onclick="agregarModelo()">+ Agregar</button>
      </div>
    </div>
    <div id="listaModelos" style="padding:0 1rem;display:flex;flex-direction:column;gap:.5rem"></div>
  </div>

  <!-- MODAL DETALLE TURNO -->
  <div id="modalDetalle" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="detalleTitulo"></h3>
        <button class="btn-close" onclick="cerrarDetalle()">✕</button>
      </div>
      <div id="detalleContenido"></div>
    </div>
  </div>

  <script src="mgr.js"></script>
</body>
</html>
